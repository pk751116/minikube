apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: html
              mountPath: /usr/share/nginx/html
            # --- mTLS: client cert + CA used by the proxy_ssl_* directives
            # in 20-frontend-configmap-nginx.yaml ---
            - name: client-tls
              mountPath: /etc/nginx/tls
              readOnly: true
            - name: mtls-ca
              mountPath: /etc/nginx/ca
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: nginx-conf
          configMap:
            name: frontend-nginx-conf
        - name: html
          configMap:
            name: frontend-html
        # --- mTLS volumes (secrets created by 01-mtls-gen-certs.sh) ---
        - name: client-tls
          secret:
            secretName: frontend-client-tls
        - name: mtls-ca
          secret:
            secretName: mtls-ca
