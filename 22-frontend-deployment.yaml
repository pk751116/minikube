apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frontend
          # nginx-unprivileged: pre-chowned to a non-root user, unlike the
          # official image (which runs its master process as root by default).
          image: nginxinc/nginx-unprivileged:1.25-alpine
          ports:
            - containerPort: 80
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"] # needed to bind :80 without root
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: html
              mountPath: /usr/share/nginx/html
            # --- mTLS: client cert + CA used by the proxy_ssl_* directives
            # in 20-frontend-configmap-nginx.yaml ---
            - name: client-tls
              mountPath: /etc/nginx/tls
              readOnly: true
            - name: mtls-ca
              mountPath: /etc/nginx/ca
              readOnly: true
            # nginx's own writable paths, needed since readOnlyRootFilesystem
            # blocks writes everywhere else.
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: nginx-conf
          configMap:
            name: frontend-nginx-conf
        - name: html
          configMap:
            name: frontend-html
        # --- mTLS volumes (secrets created by 01-mtls-gen-certs.sh) ---
        - name: client-tls
          secret:
            secretName: frontend-client-tls
        - name: mtls-ca
          secret:
            secretName: mtls-ca
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
