---
# ============================================================
# Minikube demo environment: frontend + backend
#
# Usage:
#   minikube start
#   minikube addons enable ingress
#   kubectl apply -f minikube-demo.yaml
#   kubectl get pods -n demo -w
#
# Access:
#   minikube service frontend-svc -n demo        (NodePort, quickest)
#   OR
#   echo "$(minikube ip) demo.local" | sudo tee -a /etc/hosts
#   curl http://demo.local/           -> frontend
#   curl http://demo.local/api/       -> proxied to backend
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: demo
  labels:
    env: demo

---
# --- Backend ------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: gcr.io/google-samples/hello-app:1.0
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: demo
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

---
# --- Frontend -------------------------------------------------
# Nginx serves a static page and reverse-proxies /api/ to backend-svc
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-conf
  namespace: demo
data:
  default.conf: |
    server {
      listen 80;

      location / {
        root /usr/share/nginx/html;
        index index.html;
      }

      location /api/ {
        proxy_pass http://backend-svc.demo.svc.cluster.local:8080/;
        proxy_set_header Host $host;
      }
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: demo
data:
  index.html: |
    <!DOCTYPE html>
    <html>
      <head><title>Demo Frontend</title></head>
      <body style="font-family: sans-serif; margin: 3rem;">
        <h1>Frontend is up</h1>
        <p>Try the backend via <a href="/api/">/api/</a></p>
      </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: html
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: nginx-conf
          configMap:
            name: frontend-nginx-conf
        - name: html
          configMap:
            name: frontend-html

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: demo
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: NodePort

---
# --- Ingress (requires: minikube addons enable ingress) ------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  namespace: demo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
