apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      automountServiceAccountToken: false
      containers:
        # --- App container ---
        - name: backend
          image: gcr.io/google-samples/hello-app:1.0
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          # Hardening: hello-app already runs as non-root (baked into its image),
          # this just makes it an enforced requirement rather than an assumption.
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

        # --- mTLS sidecar ---
        # Terminates mTLS on :443 and verifies the caller's client cert
        # (against the demo CA) before proxying plaintext to the backend
        # container above on localhost:8080.
        # Nginx config: 13-backend-mtls-configmap.yaml
        # Certs/secrets: 01-mtls-gen-certs.sh
        - name: mtls-proxy
          # nginx-unprivileged: pre-chowned to a non-root user, unlike the
          # official image (which runs its master process as root by default).
          image: nginxinc/nginx-unprivileged:1.25-alpine
          ports:
            - containerPort: 443
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"] # needed to bind :443 without root
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: mtls-nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: server-tls
              mountPath: /etc/nginx/tls
              readOnly: true
            - name: mtls-ca
              mountPath: /etc/nginx/ca
              readOnly: true
            # nginx's own writable paths, needed since readOnlyRootFilesystem
            # blocks writes everywhere else.
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        # --- mTLS volumes ---
        - name: mtls-nginx-conf
          configMap:
            name: backend-nginx-mtls-conf
        - name: server-tls
          secret:
            secretName: backend-server-tls
        - name: mtls-ca
          secret:
            secretName: mtls-ca
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
